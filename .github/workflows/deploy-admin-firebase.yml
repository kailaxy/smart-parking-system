name: Deploy Admin To Firebase Hosting

on:
  push:
    branches:
      - main
      - staging
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve environment
        id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TARGET="${{ github.event.inputs.environment }}"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            TARGET="production"
          else
            TARGET="staging"
          fi
          echo "target=$TARGET" >> "$GITHUB_OUTPUT"
          if [ "$TARGET" = "production" ]; then
            echo "project_id=${{ secrets.FIREBASE_PROJECT_ID }}" >> "$GITHUB_OUTPUT"
            echo "hosting_target=admin-production" >> "$GITHUB_OUTPUT"
            echo "service_account=${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" >> "$GITHUB_OUTPUT"
          else
            echo "project_id=${{ secrets.FIREBASE_STAGING_PROJECT_ID }}" >> "$GITHUB_OUTPUT"
            echo "hosting_target=admin-staging" >> "$GITHUB_OUTPUT"
            echo "service_account=${{ secrets.FIREBASE_STAGING_SERVICE_ACCOUNT }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: admin-app/package-lock.json

      - name: Install dependencies
        working-directory: admin-app
        run: npm ci

      - name: Typecheck
        working-directory: admin-app
        run: npm run typecheck

      - name: Build admin app
        working-directory: admin-app
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ steps.env.outputs.project_id }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: npm run build

      - name: Setup Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firebase hosting
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcp-key.json
          FIREBASE_SERVICE_ACCOUNT: ${{ steps.env.outputs.service_account }}
          FIREBASE_PROJECT_ID: ${{ steps.env.outputs.project_id }}
          HOSTING_TARGET: ${{ steps.env.outputs.hosting_target }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > "$GOOGLE_APPLICATION_CREDENTIALS"
          firebase deploy \
            --project "$FIREBASE_PROJECT_ID" \
            --only "hosting:$HOSTING_TARGET"

      - name: Deploy Firestore rules and indexes
        if: steps.env.outputs.target == 'production'
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcp-key.json
          FIREBASE_SERVICE_ACCOUNT: ${{ steps.env.outputs.service_account }}
          FIREBASE_PROJECT_ID: ${{ steps.env.outputs.project_id }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > "$GOOGLE_APPLICATION_CREDENTIALS"
          firebase deploy \
            --project "$FIREBASE_PROJECT_ID" \
            --only firestore:rules,firestore:indexes
