name: Rollback Admin Firebase Hosting

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to roll back
        required: true
        default: production
        type: choice
        options:
          - production
          - staging

jobs:
  rollback:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve environment
        id: env
        run: |
          if [ "${{ github.event.inputs.environment }}" = "production" ]; then
            echo "project_id=${{ secrets.FIREBASE_PROJECT_ID }}" >> "$GITHUB_OUTPUT"
            echo "hosting_target=admin-production" >> "$GITHUB_OUTPUT"
            echo "service_account=${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" >> "$GITHUB_OUTPUT"
          else
            echo "project_id=${{ secrets.FIREBASE_STAGING_PROJECT_ID }}" >> "$GITHUB_OUTPUT"
            echo "hosting_target=admin-staging" >> "$GITHUB_OUTPUT"
            echo "service_account=${{ secrets.FIREBASE_STAGING_SERVICE_ACCOUNT }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Firebase CLI
        run: npm install -g firebase-tools

      - name: Roll back hosting to previous release
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcp-key.json
          FIREBASE_SERVICE_ACCOUNT: ${{ steps.env.outputs.service_account }}
          FIREBASE_PROJECT_ID: ${{ steps.env.outputs.project_id }}
          HOSTING_TARGET: ${{ steps.env.outputs.hosting_target }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > "$GOOGLE_APPLICATION_CREDENTIALS"
          chmod 600 "$GOOGLE_APPLICATION_CREDENTIALS"
          firebase hosting:rollback \
            --project "$FIREBASE_PROJECT_ID" \
            --target "$HOSTING_TARGET" \
            --non-interactive

      - name: List recent releases after rollback
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcp-key.json
          FIREBASE_SERVICE_ACCOUNT: ${{ steps.env.outputs.service_account }}
          FIREBASE_PROJECT_ID: ${{ steps.env.outputs.project_id }}
          HOSTING_TARGET: ${{ steps.env.outputs.hosting_target }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > "$GOOGLE_APPLICATION_CREDENTIALS"
          chmod 600 "$GOOGLE_APPLICATION_CREDENTIALS"
          firebase hosting:releases:list \
            --project "$FIREBASE_PROJECT_ID" \
            --target "$HOSTING_TARGET" \
            --limit 5
